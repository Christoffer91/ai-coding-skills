name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: test (${{ matrix.os }} · py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
        python-version: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Shell syntax
        run: bash -n orchestrate/install.sh orchestrate/scripts/orchestrate.sh orchestrate/dashboard/launchd/install-launchd.sh
      - name: Compile Python sources
        run: python -m compileall -q orchestrate
      - name: Run orchestrate package tests
        run: python -m unittest discover -s orchestrate/tests -v
        env:
          ORCH_NOTIFY_DISABLE: "1"
      - name: PII guard
        if: runner.os != 'Windows'
        run: bash ./scan-pii.sh
