<style>
  :root{
    --ground:#F3F3F5; --surface:#FFFFFF; --surface-2:#F8F8FA;
    --ink:#191A1E; --muted:#585A64; --faint:#8A8D98; --border:#E5E6EA; --border-strong:#D0D2D9;
    --claude:#B65C3B; --claude-soft:#F4E7E0;      /* who: Claude — warm clay */
    --codex:#0B8A66;  --codex-soft:#DBF0E9;       /* who: Codex  — teal green */
    --done:#5E6675;   --done-soft:#EBECEF;        /* finished — calm slate */
    --await:#B37A16;  --await-soft:#F6EBD6;
    --fail:#C1443D;   --fail-soft:#FAE7E5;
    --sans:ui-sans-serif,-apple-system,"SF Pro Text",system-ui,"Segoe UI",sans-serif;
    --mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,monospace;
    --r:14px; --shadow:0 1px 2px rgba(16,24,40,.05),0 2px 6px rgba(16,24,40,.05);
  }
  @media (prefers-color-scheme:dark){:root{
    --ground:#0E1116; --surface:#171A21; --surface-2:#1C2029;
    --ink:#E9EBF0; --muted:#9BA1AE; --faint:#6B7280; --border:#282C35; --border-strong:#3A404C;
    --claude:#E2A084; --claude-soft:#33231B; --codex:#41BE96; --codex-soft:#12281F;
    --done:#8B93A2; --done-soft:#20242C; --await:#E3A94A; --await-soft:#2A2214; --fail:#EB6C64; --fail-soft:#2E1918;
    --live:#46CE8C; --live-soft:#122E20;
    --shadow:0 1px 2px rgba(0,0,0,.35),0 2px 8px rgba(0,0,0,.4);
  }}
  :root[data-theme="light"]{
    --ground:#F3F3F5; --surface:#FFFFFF; --surface-2:#F8F8FA; --ink:#191A1E; --muted:#585A64; --faint:#8A8D98;
    --border:#E5E6EA; --border-strong:#D0D2D9; --claude:#B65C3B; --claude-soft:#F4E7E0; --codex:#0B8A66; --codex-soft:#DBF0E9;
    --done:#5E6675; --done-soft:#EBECEF; --await:#B37A16; --await-soft:#F6EBD6; --fail:#C1443D; --fail-soft:#FAE7E5;
    --live:#1FA055; --live-soft:#E4F5EC;
    --shadow:0 1px 2px rgba(16,24,40,.05),0 2px 6px rgba(16,24,40,.05);
  }
  :root[data-theme="dark"]{
    --ground:#0E1116; --surface:#171A21; --surface-2:#1C2029; --ink:#E9EBF0; --muted:#9BA1AE; --faint:#6B7280;
    --border:#282C35; --border-strong:#3A404C; --claude:#E2A084; --claude-soft:#33231B; --codex:#41BE96; --codex-soft:#12281F;
    --done:#8B93A2; --done-soft:#20242C; --await:#E3A94A; --await-soft:#2A2214; --fail:#EB6C64; --fail-soft:#2E1918;
    --live:#46CE8C; --live-soft:#122E20;
    --shadow:0 1px 2px rgba(0,0,0,.35),0 2px 8px rgba(0,0,0,.4);
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--ground);color:var(--ink);font-family:var(--sans);font-size:15.5px;line-height:1.5;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1160px;margin:0 auto;padding:34px 26px 72px}
  .mono{font-family:var(--mono);font-variant-numeric:tabular-nums}
  .lbl{font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);font-weight:700}
  header{display:flex;align-items:flex-end;justify-content:space-between;gap:18px;margin-bottom:22px;flex-wrap:wrap}
  h1{font-size:27px;font-weight:720;letter-spacing:-.02em;margin:0}
  .sub{color:var(--muted);font-size:15px;margin-top:5px}
  .legend{display:flex;gap:14px;align-items:center;margin:2px 0 24px;font-size:13px;color:var(--muted)}
  .legend .k{display:inline-flex;align-items:center;gap:6px}
  .legend .sw{width:11px;height:11px;border-radius:50%}
  .live{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:13.5px;font-family:var(--mono)}
  .live .dot{width:9px;height:9px;border-radius:50%;background:var(--codex);animation:pulse 2.4s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 color-mix(in srgb,var(--codex) 55%,transparent)}70%{box-shadow:0 0 0 7px transparent}100%{box-shadow:0 0 0 0 transparent}}
  @media (prefers-reduced-motion:reduce){.live .dot{animation:none}}
  .summary{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:30px}
  .stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:15px 20px;min-width:128px;box-shadow:var(--shadow)}
  .stat .n{font-size:32px;font-weight:720;font-family:var(--mono);font-variant-numeric:tabular-nums;line-height:1.05}
  .stat.await .n{color:var(--await)} .stat.run .n{color:var(--codex)} .stat.done .n{color:var(--done)}
  .stat .k{margin-top:4px}
  section h2{font-size:13.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);font-weight:720;margin:0 0 13px;display:flex;align-items:center;gap:9px}
  .count-pill{font-family:var(--mono);background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:2px 10px;font-size:12.5px;color:var(--muted)}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(370px,1fr));gap:16px}
  .card{background:var(--surface);border:1px solid var(--border);border-left-width:4px;border-left-color:var(--border);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden;transition:border-color .15s}
  .card:hover{border-color:var(--border-strong)}
  .card.acc-claude{border-left-color:var(--claude)} .card.acc-codex{border-left-color:var(--codex)} .card.acc-await{border-left-color:var(--await)} .card.acc-done{border-left-color:var(--done)}
  .card .head{display:flex;align-items:flex-start;gap:12px;padding:17px 19px 13px;cursor:pointer}
  .card .repo{font-family:var(--mono);font-size:13px;color:var(--muted)}
  .card .title{font-weight:660;font-size:17.5px;letter-spacing:-.01em;margin-top:3px;text-wrap:balance;line-height:1.28}
  .pill{font-size:12.5px;font-weight:700;padding:4px 11px;border-radius:20px;white-space:nowrap;font-family:var(--mono)}
  .pill.claude{background:var(--claude-soft);color:var(--claude)} .pill.codex{background:var(--codex-soft);color:var(--codex)}
  .pill.done{background:var(--done-soft);color:var(--done)} .pill.await{background:var(--await-soft);color:var(--await)} .pill.fail{background:var(--fail-soft);color:var(--fail)}
  .stepper{display:flex;align-items:center;gap:0;padding:4px 19px 12px}
  .node{width:16px;height:16px;border-radius:50%;border:2.5px solid var(--border-strong);background:var(--surface);flex:0 0 auto;z-index:1}
  .node.k-claude.done{background:var(--claude);border-color:var(--claude)} .node.k-codex.done{background:var(--codex);border-color:var(--codex)} .node.k-neutral.done{background:var(--done);border-color:var(--done)}
  .node.k-claude.active{border-color:var(--claude);box-shadow:0 0 0 4px var(--claude-soft)} .node.k-codex.active{border-color:var(--codex);box-shadow:0 0 0 4px var(--codex-soft)} .node.k-neutral.active{border-color:var(--muted);box-shadow:0 0 0 4px var(--surface-2)}
  .node.fail{background:var(--fail);border-color:var(--fail)}
  .conn{height:2.5px;flex:1 1 auto;background:var(--border);min-width:6px} .conn.done{background:var(--border-strong)}
  .activity{display:flex;align-items:baseline;gap:9px;padding:0 19px 14px;font-size:14px;color:var(--muted);line-height:1.4}
  .who{font-family:var(--mono);font-size:11.5px;font-weight:700;padding:3px 9px;border-radius:7px;flex:0 0 auto;letter-spacing:.02em}
  .who.claude{background:var(--claude-soft);color:var(--claude)} .who.codex{background:var(--codex-soft);color:var(--codex)} .who.neutral{background:var(--surface-2);color:var(--muted)}
  .hb{font-family:var(--mono);font-size:11.5px;font-weight:700;padding:3px 9px;border-radius:7px;white-space:nowrap;display:inline-flex;align-items:center;gap:6px;flex:0 0 auto}
  .hb.live{background:var(--live-soft);color:var(--live)} .hb.live .d{width:7px;height:7px;border-radius:50%;background:var(--live);animation:pulse 2s infinite}
  .hb.stale{background:var(--await-soft);color:var(--await)} .hb.exited{background:var(--fail-soft);color:var(--fail)}
  .pill.live{background:var(--live-soft);color:var(--live)} .pill.stale{background:var(--await-soft);color:var(--await)} .pill.dead{background:var(--fail-soft);color:var(--fail)} .pill.needs{background:var(--await-soft);color:var(--await)}
  .pill.live .d{width:7px;height:7px;border-radius:50%;background:var(--live);display:inline-block;margin-right:6px;animation:pulse 2s infinite;vertical-align:middle}
  .card.h-live{border-left-color:var(--live)} .card.h-needs{border-left-color:var(--await)}
  .card.h-stale{border-left-color:var(--await);background:color-mix(in srgb,var(--await) 5%,var(--surface))}
  .card.h-dead{border-left-color:var(--fail);background:color-mix(in srgb,var(--fail) 7%,var(--surface))}
  .stat.live .n{color:var(--live)} .stat.stale .n{color:var(--await)} .stat.dead .n{color:var(--fail)}
  .activity .act b{color:var(--ink);font-weight:660} .activity .act{min-width:0}
  .meta{display:flex;gap:24px;padding:0 19px 15px;flex-wrap:wrap}
  .meta .cell .v{font-family:var(--mono);font-variant-numeric:tabular-nums;font-size:18px;font-weight:640;margin-top:2px}
  .meta .cell .v.small{font-size:15px;font-weight:560;color:var(--muted)}
  .chips{display:flex;gap:8px;flex-wrap:wrap;padding:0 19px 17px}
  .chip{font-family:var(--mono);font-size:12.5px;padding:4px 10px;border-radius:7px;background:var(--surface-2);border:1px solid var(--border);color:var(--muted)}
  .chip.exec{color:var(--codex);border-color:color-mix(in srgb,var(--codex) 30%,var(--border))}
  .chip.plan{color:var(--claude);border-color:color-mix(in srgb,var(--claude) 30%,var(--border))}
  a.pr{color:var(--ink);text-decoration:none;font-family:var(--mono);font-size:13px;font-weight:640}
  a.pr:hover{text-decoration:underline}
  .gate{margin:0 19px 17px;background:var(--await-soft);border:1px solid color-mix(in srgb,var(--await) 40%,transparent);border-radius:11px;padding:14px 15px}
  .gate .q{font-weight:620;font-size:15px;margin-bottom:11px;line-height:1.4}
  .gate .opts{display:flex;gap:9px;flex-wrap:wrap}
  .btn{font-family:var(--sans);font-size:14px;font-weight:640;padding:9px 16px;border-radius:9px;border:1px solid var(--border-strong);background:var(--surface);color:var(--ink);cursor:pointer;transition:transform .06s,background .12s,border-color .12s}
  .btn:hover{border-color:var(--await);background:var(--await-soft)} .btn:active{transform:translateY(1px)}
  .btn.primary{background:var(--await);border-color:var(--await);color:#fff} .btn.primary:hover{filter:brightness(1.06)}
  .btn:focus-visible{outline:2px solid var(--await);outline-offset:2px}
  .actions{display:flex;gap:8px;padding:0 19px 16px}
  .btn.sm{font-size:12.5px;font-weight:640;padding:6px 13px;border-radius:8px}
  .btn.restart{border-color:var(--live);color:var(--live)} .btn.restart:hover{background:var(--live-soft);border-color:var(--live)}
  .btn[disabled]{opacity:.6;cursor:default}
  .answered{font-size:14px;color:var(--muted);padding:0 19px 16px;display:flex;align-items:center;gap:8px} .answered b{color:var(--ink);font-weight:620}
  .detail{border-top:1px solid var(--border);padding:8px 19px 10px;background:var(--surface-2);display:none} .card.open .detail{display:block} .card.open .caret{transform:rotate(90deg)}
  .caret{color:var(--faint);transition:transform .15s;margin-left:auto;flex:0 0 auto;padding-top:3px;font-size:15px}
  .row{display:flex;gap:13px;padding:11px 0;border-bottom:1px solid var(--border)} .row:last-child{border-bottom:0}
  .row .idx{font-family:var(--mono);color:var(--faint);font-size:13px;width:18px;flex:0 0 auto;padding-top:2px}
  .row .stn{width:11px;height:11px;border-radius:50%;flex:0 0 auto;margin-top:5px;background:var(--border-strong)}
  .row .stn.k-claude.done{background:var(--claude)} .row .stn.k-codex.done{background:var(--codex)} .row .stn.k-neutral.done{background:var(--done)}
  .row .stn.k-claude.active{background:var(--claude)} .row .stn.k-codex.active{background:var(--codex)} .row .stn.fail{background:var(--fail)}
  .row .name{font-weight:620;font-size:14.5px} .row .actor{font-family:var(--mono);font-size:12px;font-weight:600}
  .row .actor.claude{color:var(--claude)} .row .actor.codex{color:var(--codex)} .row .actor.neutral{color:var(--faint)}
  .row .note{color:var(--muted);font-size:13.5px;margin-top:3px} .row .st{margin-left:auto;font-size:12px;font-family:var(--mono);color:var(--faint);flex:0 0 auto;padding-top:2px}
  .foot{margin-top:34px;color:var(--faint);font-size:13px;text-align:center} .empty{color:var(--muted);font-size:14px;padding:6px 0 2px}
</style>

<div class="wrap">
  <header>
    <div>
      <h1>orchestrate</h1>
      <div class="sub">dual-brain runs on this machine · <span style="color:var(--claude);font-weight:600">Claude</span> plans &amp; reviews · <span style="color:var(--codex);font-weight:600">Codex</span> (gpt-5.6-sol) executes</div>
    </div>
    <div class="live"><span class="dot"></span><span id="clock">connecting…</span></div>
  </header>
  <div class="legend">
    <span class="k"><span class="sw" style="background:var(--claude)"></span>Claude — plan / review</span>
    <span class="k"><span class="sw" style="background:var(--codex)"></span>Codex — critique / code / fix</span>
    <span class="k"><span class="sw" style="background:var(--done)"></span>done</span>
  </div>
  <div class="summary" id="summary"></div>
  <section id="needs" style="margin-bottom:30px"></section>
  <section id="active"></section>
  <div class="foot mono">~/.orchestrate/runs · auto-refreshes · click a run to expand its pipeline</div>
</div>

<script>
let RUNS=[], open={}, localAnswered={};
const kindOf=a=>/claude|opus|fable|sonnet/i.test(a||"")?"claude":/gpt|codex/i.test(a||"")?"codex":"neutral";
const whoLabel=k=>k==="claude"?"Claude":k==="codex"?"Codex":"Driver";
const safeUrl=u=>/^(https?:\/\/|#)/.test(u||"")?u:"#";
const isAns=r=>r.answered||localAnswered[r.id];
const ansChoice=r=>(r.answered&&r.answered.choice)||localAnswered[r.id];
function ago(sec){const s=Math.max(0,Math.round(Date.now()/1000-sec));if(s<60)return s+"s ago";const m=Math.round(s/60);if(m<60)return m+"m ago";const h=Math.floor(m/60);return h+"h "+(m%60)+"m ago";}
function dur(sec){const m=Math.max(0,Math.round((Date.now()/1000-sec)/60));if(m<60)return m+"m";const h=Math.floor(m/60);return h+"h "+(m%60)+"m";}
const esc=s=>String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const curStep=r=>(r.steps||[]).find(s=>s.state==="active")||(r.steps||[]).slice().reverse().find(s=>s.state==="done")||(r.steps||[])[0];
function hb(r){const h=r.health;if(!h||h==="done"||h==="waiting")return"";
  const age=r.staleSecs!=null?r.staleSecs:Math.max(0,Math.round(Date.now()/1000-(r.updatedAt||0)));
  const a=age<60?age+"s":age<3600?Math.round(age/60)+"m":Math.floor(age/3600)+"h";
  if(h==="live")return `<span class="hb live"><span class="d"></span>live</span>`;
  if(h==="stale")return `<span class="hb stale" title="no update for ${a}">⚠ stalled · ${a}</span>`;
  if(h==="exited")return `<span class="hb exited" title="worker process is gone">■ exited</span>`;
  return"";}

function stepper(r){let h='<div class="stepper">';(r.steps||[]).forEach((s,i)=>{
  const st=s.state==="done"?"done":s.state==="active"?"active":s.state==="fail"?"fail":"";
  h+=`<span class="node k-${kindOf(s.actor)} ${st}" title="${esc(s.name)} · ${esc(s.actor)}"></span>`;
  if(i<r.steps.length-1)h+=`<span class="conn ${r.steps[i].state==='done'?'done':''}"></span>`;});return h+'</div>';}
function detail(r){let h='<div class="detail">';(r.steps||[]).forEach(s=>{const k=kindOf(s.actor);
  h+=`<div class="row"><span class="idx">${s.n}</span><span class="stn k-${k} ${s.state}"></span>
    <div><div class="name">${esc(s.name)} <span class="actor ${k}">${esc(s.actor)}</span></div>
    ${s.note?`<div class="note">${esc(s.note)}</div>`:''}</div><span class="st">${esc(s.state)}</span></div>`;});return h+'</div>';}
function card(r){
  const cur=curStep(r), ck=cur?kindOf(cur.actor):"neutral";
  const h=r.health||"live";
  const age=r.staleSecs!=null?r.staleSecs:Math.max(0,Math.round(Date.now()/1000-(r.updatedAt||0)));
  const aStr=age<3600?Math.round(age/60)+"m":Math.floor(age/3600)+"h";
  const cls=r.status==="done"?"":(r.gate&&!isAns(r))?"h-needs":h==="stale"?"h-stale":h==="exited"?"h-dead":"h-live";
  let pill;
  if(r.status==="done") pill=`<span class="pill done">merged ✓</span>`;
  else if(r.gate&&!isAns(r)) pill=`<span class="pill needs">needs you</span>`;
  else if(h==="exited") pill=`<span class="pill dead">■ not running</span>`;
  else if(h==="stale") pill=`<span class="pill stale">⚠ stalled · ${aStr}</span>`;
  else pill=`<span class="pill live"><span class="d"></span>running</span>`;
  const m=r.metrics||{}, prTxt=r.pr?`#${r.pr.number} ${String(r.pr.state||"").toLowerCase()}`:"no PR yet";
  let activity="";
  if(cur && r.status!=="done" && !(r.gate&&!isAns(r))){
    activity=`<div class="activity"><span class="who ${ck}">${whoLabel(ck)}</span><span class="act"><b>${esc(cur.name)}</b>${cur.note?` — ${esc(cur.note)}`:""}</span></div>`;
  }
  let gate="";
  if(r.gate&&!isAns(r)){gate=`<div class="gate"><div class="q">${esc(r.gate.question)}</div><div class="opts">`+
    (r.gate.options||[]).map(o=>`<button class="btn ${o.primary?'primary':''}" data-ans="${esc(r.id)}" data-choice="${esc(o.label)}">${esc(o.label)}</button>`).join("")+`</div></div>`;}
  else if(isAns(r)){gate=`<div class="answered">✓ You chose <b>${esc(ansChoice(r))}</b> — sent to the run</div>`;}
  let actions="";
  if((h==="stale"||h==="exited") && r.status!=="done" && !(r.gate&&!isAns(r))){
    actions=`<div class="actions"><button class="btn sm restart" data-restart="${esc(r.id)}">↻ Restart</button></div>`;
  }
  return `<div class="card ${cls} ${open[r.id]?'open':''}" data-id="${esc(r.id)}">
    <div class="head" data-toggle="${esc(r.id)}">
      <div style="min-width:0"><div class="repo">${esc(r.repo)} · ${esc(r.branch)}</div><div class="title">${esc(r.title)}</div></div>
      ${pill}<span class="caret">▸</span></div>
    ${stepper(r)}
    ${activity}
    <div class="meta">
      <div class="cell"><div class="lbl">step</div><div class="v">${r.step||0}/7</div></div>
      <div class="cell"><div class="lbl">elapsed</div><div class="v">${r.startedAt?dur(r.startedAt):"—"}</div></div>
      <div class="cell"><div class="lbl">updated</div><div class="v small">${r.updatedAt?ago(r.updatedAt):"—"}</div></div>
      <div class="cell"><div class="lbl">tests</div><div class="v small">${esc(m.tests||"—")}</div></div></div>
    <div class="chips"><span class="chip exec">${esc(r.executor||"gpt-5.6-sol")}</span><span class="chip plan">plan: ${esc(r.planner||"Claude")}</span>
      ${r.pr?`<a class="pr" href="${esc(safeUrl(r.pr.url))}" target="_blank" rel="noopener">${prTxt} ↗</a>`:`<span class="chip">${prTxt}</span>`}</div>
    ${gate}${actions}${detail(r)}</div>`;
}
function render(){
  const needs=RUNS.filter(r=>r.gate&&!isAns(r)), rest=RUNS.filter(r=>!(r.gate&&!isAns(r)));
  const activeRuns=RUNS.filter(r=>r.status!=="done" && !(r.gate&&!isAns(r)));
  const byH=h=>activeRuns.filter(r=>(r.health||"live")===h).length;
  const nLive=byH("live"), nStale=byH("stale"), nDead=byH("exited"), nAwait=needs.length, nDone=RUNS.filter(r=>r.status==="done").length;
  document.getElementById("summary").innerHTML=
    `<div class="stat live"><div class="n">${nLive}</div><div class="k lbl">live</div></div>
     <div class="stat stale"><div class="n">${nStale}</div><div class="k lbl">stalled</div></div>`+
    (nDead?`<div class="stat dead"><div class="n">${nDead}</div><div class="k lbl">not running</div></div>`:"")+
    `<div class="stat await"><div class="n">${nAwait}</div><div class="k lbl">need you</div></div>
     <div class="stat done"><div class="n">${nDone}</div><div class="k lbl">done</div></div>`;
  const needsEl=document.getElementById("needs");
  if(nAwait){needsEl.innerHTML=`<h2>Needs you <span class="count-pill">${nAwait}</span></h2><div class="grid">`+needs.map(card).join("")+`</div>`;needsEl.style.display="";}
  else needsEl.style.display="none";
  document.getElementById("active").innerHTML=`<h2>All runs <span class="count-pill">${rest.length}</span></h2>`+
    (rest.length?`<div class="grid">`+rest.map(card).join("")+`</div>`:`<div class="empty">No runs yet. Start one with <span class="mono">/orchestrate &lt;topic&gt;</span>.</div>`);
}
document.addEventListener("click",async e=>{
  const ans=e.target.closest("[data-ans]");
  if(ans){e.stopPropagation();const id=ans.dataset.ans,choice=ans.dataset.choice;localAnswered[id]=choice;render();
    try{await fetch("/api/answer",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({id,choice})});}catch(_){}
    load();return;}
  const rst=e.target.closest("[data-restart]");
  if(rst){e.stopPropagation();const id=rst.dataset.restart;rst.textContent="↻ restarting…";rst.disabled=true;
    try{const res=await fetch("/api/restart",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({id})});
      if(!res.ok){const j=await res.json().catch(()=>({}));rst.textContent="✕ can't restart";rst.title=j.error||"";}}
    catch(_){rst.textContent="✕ failed";}
    setTimeout(load,1200);return;}
  const tog=e.target.closest("[data-toggle]"); if(tog){open[tog.dataset.toggle]=!open[tog.dataset.toggle];render();}
});
async function load(){
  try{const res=await fetch("/api/runs",{cache:"no-store"});RUNS=await res.json();
    RUNS.sort((a,b)=>(a.gate&&!isAns(a)?0:1)-(b.gate&&!isAns(b)?0:1)||(b.updatedAt||0)-(a.updatedAt||0));
    render();document.getElementById("clock").textContent="updated "+new Date().toLocaleTimeString();}
  catch(e){document.getElementById("clock").textContent="dashboard offline";}
}
load();setInterval(load,4000);
</script>
