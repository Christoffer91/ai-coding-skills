<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="color-scheme" content="light dark">
<title>orchestrate</title>
<style>
  :root{
    --ground:#F2F4F3; --surface:#FFFFFF; --surface-2:#F7F9F8;
    --ink:#17191C; --muted:#5A6169; --faint:#8B929B; --border:#E3E7E5; --border-strong:#CBD2CE;
    --claude:#B65C3B; --claude-soft:#F5E8E1;
    --codex:#0B8A66;  --codex-soft:#DDF0E9;
    --live:#1FA055;   --live-soft:#E3F4EA;
    --await:#B37A16;  --await-soft:#F7ECD8;
    --fail:#C1443D;   --fail-soft:#FAE8E6;
    --done:#68707C;   --done-soft:#ECEEEF;
    --sans:ui-sans-serif,-apple-system,"SF Pro Text",system-ui,"Segoe UI",sans-serif;
    --mono:ui-monospace,"SF Mono","JetBrains Mono","Cascadia Code",Menlo,monospace;
    --r:16px; --shadow:0 1px 2px rgba(20,24,28,.05),0 3px 10px rgba(20,24,28,.04);
  }
  @media (prefers-color-scheme:dark){:root{
    --ground:#0E1213; --surface:#161B1C; --surface-2:#1B2122;
    --ink:#EAEDEC; --muted:#9AA3A6; --faint:#6C757A; --border:#252C2D; --border-strong:#3A4345;
    --claude:#DE9C7F; --claude-soft:#31241D; --codex:#3DBC92; --codex-soft:#11291F;
    --live:#43C989; --live-soft:#0F2A1C; --await:#E0A94F; --await-soft:#2C2313;
    --fail:#EA6E64; --fail-soft:#2F1917; --done:#8A939E; --done-soft:#20262A;
    --shadow:0 1px 2px rgba(0,0,0,.4),0 3px 12px rgba(0,0,0,.35);
  }}
  :root[data-theme="light"]{
    --ground:#F2F4F3; --surface:#FFFFFF; --surface-2:#F7F9F8; --ink:#17191C; --muted:#5A6169; --faint:#8B929B;
    --border:#E3E7E5; --border-strong:#CBD2CE; --claude:#B65C3B; --claude-soft:#F5E8E1; --codex:#0B8A66; --codex-soft:#DDF0E9;
    --live:#1FA055; --live-soft:#E3F4EA; --await:#B37A16; --await-soft:#F7ECD8; --fail:#C1443D; --fail-soft:#FAE8E6;
    --done:#68707C; --done-soft:#ECEEEF;
    --shadow:0 1px 2px rgba(20,24,28,.05),0 3px 10px rgba(20,24,28,.04);
  }
  :root[data-theme="dark"]{
    --ground:#0E1213; --surface:#161B1C; --surface-2:#1B2122; --ink:#EAEDEC; --muted:#9AA3A6; --faint:#6C757A;
    --border:#252C2D; --border-strong:#3A4345; --claude:#DE9C7F; --claude-soft:#31241D; --codex:#3DBC92; --codex-soft:#11291F;
    --live:#43C989; --live-soft:#0F2A1C; --await:#E0A94F; --await-soft:#2C2313; --fail:#EA6E64; --fail-soft:#2F1917;
    --done:#8A939E; --done-soft:#20262A;
    --shadow:0 1px 2px rgba(0,0,0,.4),0 3px 12px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box;min-width:0}
  html,body{overflow-x:hidden}
  body{margin:0;background:var(--ground);color:var(--ink);font-family:var(--sans);
    font-size:15.5px;line-height:1.5;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1180px;margin:0 auto;padding:38px 28px 80px}
  .mono{font-family:var(--mono);font-variant-numeric:tabular-nums}
  .lbl{font-size:11.5px;letter-spacing:.07em;text-transform:uppercase;color:var(--faint);font-weight:650;font-family:var(--mono)}
  :focus-visible{outline:2.5px solid var(--codex);outline-offset:2px;border-radius:6px}

  /* ── header: mono identity ─────────────────────────────── */
  header{display:flex;align-items:flex-end;justify-content:space-between;gap:18px;margin-bottom:26px;flex-wrap:wrap}
  h1{font-family:var(--mono);font-size:26px;font-weight:700;letter-spacing:-.03em;margin:0}
  h1 .tick{color:var(--codex)}
  .sub{color:var(--muted);font-size:14.5px;margin-top:6px}
  .sub b{font-weight:640}
  .sub .c1{color:var(--claude)} .sub .c2{color:var(--codex)}
  .hright{display:flex;align-items:center;gap:12px}
  .clockline{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:13px;font-family:var(--mono)}
  .clockline .dot{width:8px;height:8px;border-radius:50%;background:var(--live);animation:pulse 2.4s infinite}
  .clockline.off .dot{background:var(--fail);animation:none}
  .themebtn{font-family:var(--mono);font-size:12px;font-weight:650;color:var(--muted);background:var(--surface);
    border:1px solid var(--border);border-radius:9px;padding:6px 11px;cursor:pointer}
  .themebtn:hover{border-color:var(--border-strong);color:var(--ink)}
  @keyframes pulse{0%{box-shadow:0 0 0 0 color-mix(in srgb,var(--live) 50%,transparent)}70%{box-shadow:0 0 0 7px transparent}100%{box-shadow:0 0 0 0 transparent}}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

  /* ── status strip: chips, zeros hidden ─────────────────── */
  .strip{display:flex;gap:9px;flex-wrap:wrap;margin-bottom:30px;align-items:center}
  .schip{font-family:var(--mono);font-size:13px;font-weight:650;padding:7px 14px;border-radius:22px;
    display:inline-flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);color:var(--muted)}
  .schip .n{font-size:15px;font-weight:720}
  .schip.needs{background:var(--await-soft);border-color:color-mix(in srgb,var(--await) 35%,transparent);color:var(--await)}
  .schip.dead{background:var(--fail-soft);border-color:color-mix(in srgb,var(--fail) 30%,transparent);color:var(--fail)}
  .schip.stale{color:var(--await)}
  .schip.liv{color:var(--live)}
  .schip.liv .d{width:7px;height:7px;border-radius:50%;background:var(--live);animation:pulse 2.2s infinite}
  .schip.claude{color:var(--claude)}

  section h2{font-size:12.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);
    font-weight:700;font-family:var(--mono);margin:0 0 14px;display:flex;align-items:center;gap:9px}
  .count-pill{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:1px 9px;font-size:12px;color:var(--muted)}

  /* ── cards: widen when few, never wider than viewport ──── */
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(min(480px,100%),1fr));gap:18px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
    box-shadow:var(--shadow);overflow:hidden;transition:border-color .15s}
  .card:hover{border-color:var(--border-strong)}
  .card .head{display:flex;align-items:flex-start;gap:12px;padding:19px 22px 12px;cursor:pointer}
  .card .head:focus-visible{outline-offset:-3px}
  .card .repo{font-family:var(--mono);font-size:13px;color:var(--faint);overflow-wrap:anywhere}
  .card .title{font-weight:680;font-size:19px;letter-spacing:-.015em;margin-top:3px;text-wrap:balance;line-height:1.25;overflow-wrap:anywhere}
  .pill{font-size:12.5px;font-weight:680;padding:5px 12px;border-radius:20px;white-space:nowrap;font-family:var(--mono)}
  .pill.live{background:var(--live-soft);color:var(--live)}
  .pill.live .d{width:7px;height:7px;border-radius:50%;background:var(--live);display:inline-block;margin-right:6px;animation:pulse 2s infinite;vertical-align:middle}
  .pill.stale{background:var(--await-soft);color:var(--await)}
  .pill.dead{background:var(--fail-soft);color:var(--fail)}
  .pill.needs{background:var(--await-soft);color:var(--await)}
  .pill.done{background:var(--done-soft);color:var(--done)}
  .pill.handoff{background:var(--claude-soft);color:var(--claude)}
  .pill.failed{background:var(--fail-soft);color:var(--fail)}
  .pill.rejected{background:var(--surface-2);color:var(--muted)}
  .caret{color:var(--faint);transition:transform .15s;margin-left:auto;flex:0 0 auto;padding-top:4px;font-size:15px}
  .card.open .caret,.hrow.open .caret{transform:rotate(90deg)}

  /* ── signature: the relay track ────────────────────────── */
  .relay{display:flex;align-items:center;padding:8px 22px 14px}
  .node{width:15px;height:15px;border-radius:50%;border:2.5px solid var(--border-strong);
    background:var(--surface);flex:0 0 auto;z-index:1}
  .node.k-claude.done{background:var(--claude);border-color:var(--claude)}
  .node.k-codex.done{background:var(--codex);border-color:var(--codex)}
  .node.k-neutral.done{background:var(--done);border-color:var(--done)}
  .node.active{width:19px;height:19px;border-width:3px;background:var(--surface)}
  .node.k-claude.active{border-color:var(--claude);box-shadow:0 0 0 4px var(--claude-soft);animation:nodepulse 2.2s infinite}
  .node.k-codex.active{border-color:var(--codex);box-shadow:0 0 0 4px var(--codex-soft);animation:nodepulse 2.2s infinite}
  .node.k-neutral.active{border-color:var(--muted);box-shadow:0 0 0 4px var(--surface-2)}
  @keyframes nodepulse{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
  .node.fail{background:var(--fail);border-color:var(--fail)}
  .seg{height:3px;flex:1 1 auto;background:var(--border);min-width:8px;border-radius:2px}
  .seg.k-claude{background:color-mix(in srgb,var(--claude) 55%,var(--border))}
  .seg.k-codex{background:color-mix(in srgb,var(--codex) 55%,var(--border))}
  .seg.k-neutral{background:var(--border-strong)}

  /* activity line — clamped, full text on hover + in detail */
  .activity{display:flex;align-items:baseline;gap:10px;padding:0 22px 15px;font-size:14.5px;color:var(--muted);line-height:1.4}
  .activity .txt{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .who{font-family:var(--mono);font-size:11.5px;font-weight:700;padding:3px 10px;border-radius:7px;flex:0 0 auto;letter-spacing:.02em}
  .who.claude{background:var(--claude-soft);color:var(--claude)}
  .who.codex{background:var(--codex-soft);color:var(--codex)}
  .who.neutral{background:var(--surface-2);color:var(--muted)}
  .activity b{color:var(--ink);font-weight:660}
  .stept{font-family:var(--mono);font-size:12.5px;color:var(--faint);white-space:nowrap}

  .meta{display:flex;gap:28px;padding:2px 22px 16px;flex-wrap:wrap}
  .meta .v{font-family:var(--mono);font-variant-numeric:tabular-nums;font-size:19px;font-weight:660;margin-top:3px}
  .meta .v.small{font-size:15px;font-weight:560;color:var(--muted)}
  .chips{display:flex;gap:8px;flex-wrap:wrap;padding:0 22px 19px}
  .chip{font-family:var(--mono);font-size:12.5px;padding:4px 11px;border-radius:8px;
    background:var(--surface-2);border:1px solid var(--border);color:var(--muted)}
  .chip.exec{color:var(--codex);border-color:color-mix(in srgb,var(--codex) 28%,var(--border))}
  .chip.plan{color:var(--claude);border-color:color-mix(in srgb,var(--claude) 28%,var(--border))}
  a.pr{color:var(--ink);text-decoration:none;font-family:var(--mono);font-size:13px;font-weight:660;align-self:center}
  a.pr:hover{text-decoration:underline}
  a.pr.merged{color:var(--muted);font-weight:600}

  /* gate */
  .gate{margin:0 22px 19px;background:var(--await-soft);border:1px solid color-mix(in srgb,var(--await) 38%,transparent);
    border-radius:12px;padding:15px 16px}
  .gate .q{font-weight:630;font-size:15px;margin-bottom:12px;line-height:1.4}
  .gate .opts{display:flex;gap:9px;flex-wrap:wrap}
  .btn{font-family:var(--sans);font-size:14px;font-weight:640;padding:9px 17px;border-radius:10px;
    border:1px solid var(--border-strong);background:var(--surface);color:var(--ink);cursor:pointer;
    transition:transform .06s,background .12s,border-color .12s}
  .btn:hover{border-color:var(--await);background:var(--await-soft)}
  .btn:active{transform:translateY(1px)}
  .btn.primary{background:var(--await);border-color:var(--await);color:#fff}
  .btn.primary:hover{filter:brightness(1.06)}
  .btn:focus-visible{outline:2.5px solid var(--await);outline-offset:2px}
  .btn[disabled]{opacity:.6;cursor:default}
  .answered{font-size:14px;color:var(--muted);padding:0 22px 17px;display:flex;align-items:center;gap:8px}
  .answered b{color:var(--ink);font-weight:630}
  .actions{display:flex;gap:8px;padding:0 22px 18px}
  .btn.sm{font-size:12.5px;font-weight:640;padding:6px 14px;border-radius:9px}
  .btn.restart{border-color:var(--live);color:var(--live)}
  .btn.restart:hover{background:var(--live-soft);border-color:var(--live)}

  /* ── expanded detail: 2-col on wide, time chips ────────── */
  .detail{border-top:1px solid var(--border);padding:14px 22px 16px;background:var(--surface-2);display:none}
  .card.open .detail,.hrow.open + .hdetail .detail{display:grid;grid-template-columns:1fr;gap:0 34px}
  @media (min-width:900px){.card.open:not(.compact) .detail,.hrow.open + .hdetail .detail{grid-template-columns:1fr 1fr}}
  .row{display:flex;gap:13px;padding:10px 0;border-bottom:1px solid var(--border);align-items:flex-start}
  .detail .row:nth-last-child(1){border-bottom:0}
  @media (min-width:900px){.detail .row:nth-last-child(2){border-bottom:0}}
  .row .idx{font-family:var(--mono);color:var(--faint);font-size:12.5px;width:14px;flex:0 0 auto;padding-top:3px}
  .row .stn{width:11px;height:11px;border-radius:50%;flex:0 0 auto;margin-top:6px;background:var(--border-strong)}
  .row .stn.k-claude.done,.row .stn.k-claude.active{background:var(--claude)}
  .row .stn.k-codex.done,.row .stn.k-codex.active{background:var(--codex)}
  .row .stn.k-neutral.done{background:var(--done)}
  .row .stn.fail{background:var(--fail)}
  .row .name{font-weight:630;font-size:14.5px}
  .row .actor{font-family:var(--mono);font-size:11.5px;font-weight:620;margin-left:6px}
  .row .actor.claude{color:var(--claude)} .row .actor.codex{color:var(--codex)} .row .actor.neutral{color:var(--faint)}
  .row .note{color:var(--muted);font-size:13.5px;margin-top:2px;overflow-wrap:anywhere}
  .tchip{margin-left:auto;flex:0 0 auto;font-family:var(--mono);font-size:12px;color:var(--faint);
    padding:2px 9px;border-radius:7px;background:var(--surface);border:1px solid var(--border);white-space:nowrap}
  .tchip.on{color:var(--codex);border-color:color-mix(in srgb,var(--codex) 30%,var(--border));animation:tpulse 2.4s infinite}
  .tchip.on.claude{color:var(--claude);border-color:color-mix(in srgb,var(--claude) 30%,var(--border))}
  @keyframes tpulse{0%,100%{opacity:1}50%{opacity:.55}}

  /* time budget bar — where the hours actually went */
  .tbar-wrap{grid-column:1/-1;padding:4px 0 12px;border-bottom:1px solid var(--border);margin-bottom:4px}
  .tbar-wrap .lbl{margin-bottom:7px;display:block}
  .tbar{display:flex;height:12px;border-radius:6px;overflow:hidden;background:var(--border);gap:2px}
  .tbar span{display:block;min-width:6px}
  .tbar .b-claude{background:var(--claude)} .tbar .b-codex{background:var(--codex)} .tbar .b-neutral{background:var(--done)}
  .tbar .b-on{animation:tpulse 2.4s infinite}
  .tbar-legend{display:flex;gap:14px;flex-wrap:wrap;margin-top:7px;font-family:var(--mono);font-size:11.5px;color:var(--faint)}
  .tbar-legend i{font-style:normal;display:inline-flex;align-items:center;gap:5px}
  .tbar-legend .sw{width:8px;height:8px;border-radius:2px;display:inline-block}

  /* ── compact density: kicks in at 4+ active runs ──────── */
  .grid.dense{grid-template-columns:repeat(auto-fill,minmax(min(330px,100%),1fr));gap:13px}
  .card.compact .head{padding:13px 16px 7px;gap:9px}
  .card.compact .repo{font-size:11px}
  .card.compact .title{font-size:15px;font-weight:650;margin-top:2px}
  .card.compact .pill{font-size:11px;padding:3px 9px}
  .card.compact .relay{padding:4px 16px 9px}
  .card.compact .node{width:11px;height:11px;border-width:2px}
  .card.compact .node.active{width:15px;height:15px;border-width:2.5px}
  .card.compact .seg{height:2.5px}
  .card.compact .activity{padding:0 16px 11px;font-size:13px;gap:8px}
  .card.compact .activity .txt{-webkit-line-clamp:1}
  .card.compact .who{font-size:10.5px;padding:2px 8px}
  .card.compact .gate{margin:0 16px 13px;padding:12px 13px}
  .card.compact .gate .q{font-size:13.5px}
  .card.compact .actions{padding:0 16px 13px}
  .cline{display:flex;gap:7px 16px;flex-wrap:wrap;align-items:baseline;padding:0 16px 14px;
    font-family:var(--mono);font-size:12px;color:var(--faint);font-variant-numeric:tabular-nums}
  .cline b{color:var(--muted);font-weight:640}
  .cline a.pr{font-size:12px}
  .card.compact .detail{padding:11px 16px 13px}

  /* ── ops table: main view at 4+ active runs ──────────── */
  .tbl{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden}
  .trow{display:grid;grid-template-columns:100px minmax(150px,1.2fr) 150px minmax(120px,2fr) 42px 60px 68px 16px;
    gap:12px;align-items:center;padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;
    border-left:4px solid transparent}
  .trow:hover{background:var(--surface-2)}
  .trow:focus-visible{outline-offset:-3px}
  .trow.thead{font-family:var(--mono);font-size:11px;letter-spacing:.07em;text-transform:uppercase;color:var(--faint);
    font-weight:650;background:var(--surface-2);padding-top:8px;padding-bottom:8px;cursor:default}
  .trow .t{font-weight:640;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .trow .t small{display:block;font-family:var(--mono);font-weight:500;font-size:11px;color:var(--faint)}
  .trow .relay{padding:0;flex:0 0 auto}
  .trow .node{width:10px;height:10px;border-width:2px}
  .trow .node.active{width:14px;height:14px;border-width:2.5px}
  .trow .seg{width:13px;flex:0 0 auto;height:2.5px}
  .trow .act{display:flex;align-items:baseline;gap:8px;color:var(--muted);font-size:13px;min-width:0}
  .trow .act .x{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .trow .num{font-family:var(--mono);font-size:12.5px;color:var(--muted);font-variant-numeric:tabular-nums;text-align:right;white-space:nowrap}
  .trow .pill{justify-self:start;font-size:11px;padding:3px 8px}
  .tdetail{border-bottom:1px solid var(--border)}
  .trow.open + .tdetail .detail{display:grid;grid-template-columns:1fr;gap:0 34px;border-top:0}
  @media (min-width:900px){.trow.open + .tdetail .detail{grid-template-columns:1fr 1fr}}
  .tdetail:last-child,.tbl > .trow:last-of-type{border-bottom:0}
  .tdetail .actions{display:none;padding:12px 20px 0}
  .trow.open + .tdetail .actions{display:flex}
  .hdetail .actions{display:none}
  .hrow.open + .hdetail .actions{display:flex}
  @media (max-width:1000px){
    .trow{grid-template-columns:100px 1fr 16px;row-gap:7px;padding:11px 14px}
    .trow .caret{grid-row:1;grid-column:3}
    .trow .relay,.trow .act{grid-column:1/-1}
    .trow .num{display:none}
    .trow.thead{display:none}}

  .card.open .activity .txt{-webkit-line-clamp:unset}
  .trow.open .act .x{white-space:normal;overflow:visible}

  /* ── model overrides ────────────────────────────── */
  .ovr{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow);margin-bottom:30px;overflow:hidden}
  .ovr .ohead{display:flex;align-items:center;gap:12px;padding:13px 20px;cursor:pointer;flex-wrap:wrap}
  .ovr .ohead:hover{background:var(--surface-2)}
  .ovr .ohead:focus-visible{outline-offset:-3px}
  .osum{display:flex;gap:8px;flex-wrap:wrap;flex:1;min-width:0}
  .ochip{font-family:var(--mono);font-size:12px;padding:3px 10px;border-radius:8px;background:var(--surface-2);border:1px solid var(--border);color:var(--faint)}
  .ochip.on{font-weight:650}
  .ochip.on.codex{background:var(--codex-soft);color:var(--codex);border-color:color-mix(in srgb,var(--codex) 30%,transparent)}
  .ochip.on.claude{background:var(--claude-soft);color:var(--claude);border-color:color-mix(in srgb,var(--claude) 30%,transparent)}
  .obody{display:none;border-top:1px solid var(--border);padding:4px 20px 16px;background:var(--surface-2)}
  .ovr.open .obody{display:block}
  .onote{color:var(--faint);font-size:12.5px;margin:12px 0 4px;max-width:82ch;line-height:1.45}
  .orow{display:grid;grid-template-columns:92px minmax(170px,1fr) auto auto 1fr;gap:12px;align-items:center;padding:13px 0;border-bottom:1px solid var(--border)}
  .orow:last-child{border-bottom:0}
  .orow .role{font-family:var(--mono);font-weight:700;font-size:13px}
  .msel{display:flex;align-items:center;gap:9px;min-width:0}
  .mdot{width:9px;height:9px;border-radius:50%;background:var(--border-strong);flex:0 0 auto}
  .mdot.codex{background:var(--codex)} .mdot.claude{background:var(--claude)}
  .osel{font-family:var(--mono);font-size:12.5px;font-weight:600;color:var(--ink);background:var(--surface);
    border:1px solid var(--border-strong);border-radius:9px;padding:7px 10px;cursor:pointer;max-width:100%}
  .oseg{display:inline-flex;border:1px solid var(--border-strong);border-radius:9px;overflow:hidden;background:var(--surface)}
  .oseg button{font-family:var(--mono);font-size:12px;font-weight:620;padding:7px 12px;background:transparent;border:0;
    border-right:1px solid var(--border);color:var(--muted);cursor:pointer}
  .oseg button:last-child{border-right:0}
  .oseg button.on{background:var(--ink);color:var(--ground)}
  .obtns{display:flex;gap:8px;align-items:center;justify-self:end;flex-wrap:wrap}
  .btn.dark{background:var(--ink);border-color:var(--ink);color:var(--ground)}
  .btn.dark:hover{background:var(--ink);filter:brightness(1.15)}
  .oexp{font-family:var(--mono);font-size:11.5px;color:var(--await);white-space:nowrap}
  @media (max-width:820px){.orow{grid-template-columns:1fr 1fr;row-gap:10px}.orow .role{grid-column:1/-1;padding-bottom:0}.obtns{justify-self:start;grid-column:1/-1}}

  /* ── history: done runs collapse into quiet rows ───────── */
  .hist{margin-top:34px}
  .hlist{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden}
  .hrow{display:flex;align-items:center;gap:12px;padding:13px 20px;cursor:pointer;border-bottom:1px solid var(--border)}
  .hlist > :last-child .detail{border-radius:0 0 var(--r) var(--r)}
  .hrow:hover{background:var(--surface-2)}
  .hrow:focus-visible{outline-offset:-3px}
  .hrow .hd{width:9px;height:9px;border-radius:50%;flex:0 0 auto}
  .hrow .hd.done{background:var(--done)} .hrow .hd.failed{background:var(--fail)} .hrow .hd.rejected{background:var(--border-strong)}
  .hrow .ht{font-weight:640;font-size:14.5px;flex:1 1 auto;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .hrow .ht small{font-family:var(--mono);font-weight:500;font-size:12px;color:var(--faint);margin-left:9px}
  .hrow .hmeta{font-family:var(--mono);font-size:12.5px;color:var(--faint);white-space:nowrap;flex:0 0 auto}
  .hrow .pill{font-size:11.5px;padding:3px 10px}
  .hdetail{border-bottom:1px solid var(--border)}
  .hdetail:last-child,.hrow:last-child{border-bottom:0}
  .hdetail .detail{border-top:0}
  @media (max-width:640px){.hrow .hmeta{display:none}}

  .foot{margin-top:38px;color:var(--faint);font-size:12.5px;text-align:center;font-family:var(--mono)}

  /* empty + offline states */
  .empty{padding:44px 26px;background:var(--surface);border:1px dashed var(--border-strong);
    border-radius:var(--r);text-align:center;color:var(--muted);font-size:15px}
  .empty .erelay{display:flex;align-items:center;justify-content:center;max-width:300px;margin:0 auto 18px;opacity:.85}
  .empty .cmd{font-family:var(--mono);font-size:14px;font-weight:650;color:var(--ink);background:var(--surface-2);
    border:1px solid var(--border);border-radius:9px;padding:8px 14px;display:inline-block;margin-top:12px}
  .empty .cmd .c2{color:var(--codex)}
  .offline{padding:26px;background:var(--surface);border:1px solid color-mix(in srgb,var(--fail) 30%,var(--border));
    border-radius:var(--r);text-align:center;color:var(--muted);font-size:14.5px}
  .offline b{color:var(--fail);font-weight:660;display:block;margin-bottom:4px;font-family:var(--mono)}
  .offline .btn{margin-top:14px}

  /* ── mobile ────────────────────────────────────────────── */
  @media (max-width:640px){
    .wrap{padding:22px 14px 60px}
    h1{font-size:22px}
    .sub{font-size:13px}
    .card .head{padding:15px 16px 10px}
    .card .title{font-size:16.5px}
    .relay{padding:6px 16px 12px}
    .activity,.answered{padding-left:16px;padding-right:16px}
    .meta{padding-left:16px;padding-right:16px;gap:18px}
    .meta .v{font-size:16px}
    .chips,.actions{padding-left:16px;padding-right:16px}
    .gate{margin-left:16px;margin-right:16px}
    .detail{padding:12px 16px 14px}
    .btn{padding:11px 17px}   /* keep ≥44px targets */
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1>orchestrate<span class="tick">.</span></h1>
      <div class="sub"><b class="c1">Claude</b> plans &amp; reviews · <b class="c2">Codex</b> (gpt-5.6-sol) executes · every run on this machine</div>
    </div>
    <div class="hright">
      <div class="clockline" id="clockline"><span class="dot"></span><span id="clock">connecting…</span></div>
      <button class="themebtn" id="notifbtn" title="Desktop notification when a run needs you or dies">notify: off</button>
      <button class="themebtn" id="themebtn" title="Cycle theme">◐ auto</button>
    </div>
  </header>

  <div class="strip" id="strip"></div>
  <section id="overrides" style="display:none"></section>
  <section id="needs" style="margin-bottom:30px"></section>
  <section id="active"></section>
  <section id="history" class="hist"></section>
  <div class="foot">~/.orchestrate/runs · auto-refreshes · click a run for its full pipeline</div>
</div>

<script>
let RUNS=[], open={}, localAnswered={}, OFFLINE=false, DEMO=/[?&]demo\b/.test(location.search);
function fmtTokens(n){n=Number(n);if(!isFinite(n)||n<=0)return"0";if(n>=1e6){const m=n/1e6;return (m>=10?Math.round(m):(m.toFixed(1).replace(/\.0$/,"")))+"M";}if(n>=1e3)return Math.round(n/1e3)+"K";return String(Math.round(n));}
const kindOf=a=>/claude|opus|fable|sonnet/i.test(a||"")?"claude":/gpt|codex|sol|terra/i.test(a||"")?"codex":"neutral";
const whoLabel=k=>k==="claude"?"Claude":k==="codex"?"Codex":"Driver";
const safeUrl=u=>/^(https?:\/\/|#)/.test(u||"")?u:"#";
const isAns=r=>r.answered||localAnswered[r.id];
const ansChoice=r=>(r.answered&&r.answered.choice)||localAnswered[r.id];
const esc=s=>String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const stepTok=s=>{const t=s&&s.tokens;if(t==null)return 0;if(typeof t==="number")return t;
  return (t.in||t.input||t.input_tokens||0)+(t.out||t.output||t.output_tokens||0);};
const runTok=r=>(r.steps||[]).reduce((a,s)=>a+stepTok(s),0);
const fmtTok=n=>!n?"":n>=1e6?(n/1e6).toFixed(1)+"M tok":n>=1000?Math.round(n/1000)+"k tok":n+" tok";
const tokBit=s=>{const t=stepTok(s);return t?" · "+fmtTok(t):"";};
function ago(sec){const s=Math.max(0,Math.round(Date.now()/1000-sec));if(s<60)return s+"s ago";const m=Math.round(s/60);if(m<60)return m+"m ago";const h=Math.floor(m/60);return h+"h "+(m%60)+"m ago";}
function dur(sec){const m=Math.max(0,Math.round((Date.now()/1000-sec)/60));if(m<60)return m+"m";const h=Math.floor(m/60);return h+"h "+(m%60)+"m";}
function span(a,b){const s=Math.max(0,Math.round((b??Date.now()/1000)-a));if(s<60)return s+"s";const m=Math.round(s/60);if(m<60)return m+"m";const h=Math.floor(m/60);return h+"h "+(m%60)+"m";}
const curStep=r=>(r.steps||[]).find(s=>s.state==="active")||(r.steps||[]).slice().reverse().find(s=>s.state==="done")||(r.steps||[])[0];
const isTerminal=r=>["done","failed","fail","rejected"].includes(r.status);
const isGateOpen=r=>r.gate&&!isAns(r);

function healthOf(r){
  if(r.health) return r.health==="exited"?"exited":r.health;    // server truth wins
  return "live";
}
function stateOf(r){ // one visual state per card: done|failed|rejected|needs|handoff|dead|stale|live
  if(r.status==="done")return"done";
  if(r.status==="failed"||r.status==="fail")return"failed";
  if(r.status==="rejected")return"rejected";
  if(isGateOpen(r))return"needs";
  if(r.status==="handoff"||healthOf(r)==="handoff")return"handoff";
  const h=healthOf(r);
  return h==="exited"?"dead":h==="stale"?"stale":"live";
}

/* PR chip trusts run status over stale pr.state */
function prBit(r){
  if(!r.pr)return `<span class="chip">no PR yet</span>`;
  const merged=r.status==="done"||/merged/i.test(r.pr.state||"");
  const closed=/closed/i.test(r.pr.state||"")&&!merged;
  const label=merged?`#${r.pr.number} merged`:closed?`#${r.pr.number} closed`:`#${r.pr.number} ${String(r.pr.state||"open").toLowerCase()}`;
  return `<a class="pr ${merged||closed?'merged':''}" href="${esc(safeUrl(r.pr.url))}" target="_blank" rel="noopener">${esc(label)} ↗</a>`;
}

/* signature: relay track — segments carry the color of the leg they lead into */
function relay(r){
  let h='<div class="relay">';
  (r.steps||[]).forEach((s,i)=>{
    const st=s.state==="done"?"done":s.state==="active"?"active":s.state==="fail"?"fail":"";
    h+=`<span class="node k-${kindOf(s.actor)} ${st}" title="${esc(s.name)} · ${esc(s.actor)}${tokBit(s)}"></span>`;
    if(i<r.steps.length-1){
      const next=r.steps[i+1];
      const reached=s.state==="done";   // leg is colored once the baton has passed it
      h+=`<span class="seg ${reached?("k-"+kindOf(next.actor)):""}"></span>`;
    }
  });
  return h+'</div>';
}

/* time budget bar — proportional step durations, colored by actor */
function timebar(r){
  const now=Date.now()/1000;
  const parts=(r.steps||[]).map(s=>{
    if(!s.startedAt)return null;
    const end=s.endedAt??(s.state==="active"?now:null);
    if(end==null||end<=s.startedAt)return null;
    return {k:kindOf(s.actor),sec:end-s.startedAt,on:s.state==="active",name:s.name};
  }).filter(Boolean);
  const total=parts.reduce((a,p)=>a+p.sec,0);
  if(parts.length<2||total<60)return"";
  const segs=parts.map(p=>`<span class="b-${p.k} ${p.on?'b-on':''}" style="flex:${Math.max(p.sec/total,.04)}" title="${esc(p.name)} · ${span(0,p.sec)}"></span>`).join("");
  const tparts=(r.steps||[]).map(s=>({k:kindOf(s.actor),tok:stepTok(s),on:s.state==="active",name:s.name})).filter(p=>p.tok>0);
  const ttotal=tparts.reduce((a,p)=>a+p.tok,0);
  const tokbar=tparts.length>=2?`<span class="lbl" style="margin-top:10px">tokens by step · ${fmtTok(ttotal)} total</span>
    <div class="tbar">${tparts.map(p=>`<span class="b-${p.k} ${p.on?'b-on':''}" style="flex:${Math.max(p.tok/ttotal,.04)}" title="${esc(p.name)} · ${fmtTok(p.tok)}"></span>`).join("")}</div>`:"";
  const per=k=>parts.filter(p=>p.k===k).reduce((a,p)=>a+p.sec,0);
  const perTok=k=>(r.steps||[]).filter(s=>kindOf(s.actor)===k).reduce((a,s)=>a+stepTok(s),0);
  const leg=[["claude","Claude"],["codex","Codex"],["neutral","driver"]]
    .filter(([k])=>per(k)>0)
    .map(([k,n])=>`<i><span class="sw b-${k}" style="background:var(--${k==='neutral'?'done':k})"></span>${n} ${span(0,per(k))}${perTok(k)?" · "+fmtTok(perTok(k)):""}</i>`).join("");
  return `<div class="tbar-wrap"><span class="lbl">time by step · ${span(0,total)} total</span>
    <div class="tbar">${segs}</div>${tokbar}<div class="tbar-legend">${leg}</div></div>`;
}

function detail(r){
  let h='<div class="detail">'+timebar(r);
  (r.steps||[]).forEach(s=>{
    const k=kindOf(s.actor);
    let t="";
    if(s.state==="active"&&s.startedAt) t=`<span class="tchip on ${k==="claude"?"claude":""}">${span(s.startedAt)}…${tokBit(s)}</span>`;
    else if(s.state==="done"&&s.startedAt&&s.endedAt) t=`<span class="tchip">${span(s.startedAt,s.endedAt)}${tokBit(s)}</span>`;
    else if(s.state==="fail") t=`<span class="tchip" style="color:var(--fail)">failed</span>`;
    h+=`<div class="row"><span class="idx">${s.n}</span><span class="stn k-${k} ${s.state}"></span>
      <div style="min-width:0"><div class="name">${esc(s.name)}<span class="actor ${k}">${esc(s.actor)}</span></div>
      ${s.note?`<div class="note">${esc(s.note)}</div>`:''}</div>${t}</div>`;
  });
  return h+'</div>';
}
function card(r,compact){
  const st=stateOf(r), cur=curStep(r), ck=cur?kindOf(cur.actor):"neutral";
  const age=r.staleSecs!=null?r.staleSecs:Math.max(0,Math.round(Date.now()/1000-(r.updatedAt||0)));
  const aStr=age<3600?Math.round(age/60)+"m":Math.floor(age/3600)+"h";
  const pills={done:'<span class="pill done">merged ✓</span>',failed:'<span class="pill failed">failed</span>',
    rejected:'<span class="pill rejected">rejected</span>',
    needs:'<span class="pill needs">needs you</span>',handoff:'<span class="pill handoff">with Claude · review</span>',
    dead:'<span class="pill dead">■ not running</span>',stale:`<span class="pill stale">⚠ stalled · ${aStr}</span>`,
    live:'<span class="pill live"><span class="d"></span>running</span>'};
  const m=r.metrics||{};
  let activity="";
  if(cur&&st!=="done"&&st!=="failed"&&st!=="needs"){
    const t=(cur.state==="active"&&cur.startedAt)?`<span class="stept">· ${span(cur.startedAt)} in step</span>`:"";
    const full=`${cur.name}${cur.note?" — "+cur.note:""}`;
    activity=`<div class="activity"><span class="who ${ck}">${whoLabel(ck)}</span>
      <span class="txt" title="${esc(full)}"><b>${esc(cur.name)}</b>${cur.note?` — ${esc(cur.note)}`:""} ${t}</span></div>`;
  }
  let gate="";
  if(isGateOpen(r)){gate=`<div class="gate"><div class="q">${esc(r.gate.question)}</div><div class="opts">`+
    (r.gate.options||[]).map(o=>`<button class="btn ${o.primary?'primary':''}" data-ans="${esc(r.id)}" data-choice="${esc(o.label)}">${esc(o.label)}</button>`).join("")+`</div></div>`;}
  else if(isAns(r)&&r.gate!==undefined&&ansChoice(r)){gate=`<div class="answered">✓ You chose <b>${esc(ansChoice(r))}</b> — sent to the run</div>`;}
  let actions="";
  if(st==="handoff"){
    const command=(r.review&&r.review.command)||`/orchestrate review ${r.topic}`;
    actions=`<div class="actions"><button class="btn sm" data-copy-review="${esc(command)}">⧉ copy review command</button></div>`;
  } else if(["stale","dead","failed"].includes(st)){
    actions=`<div class="actions"><button class="btn sm restart" data-restart="${esc(r.id)}">↻ Restart</button></div>`;
  }
  const edge={done:"var(--done)",failed:"var(--fail)",rejected:"var(--muted)",needs:"var(--await)",handoff:"var(--claude)",dead:"var(--fail)",stale:"var(--await)",live:"var(--live)"}[st];
  const slim=compact&&!open[r.id];
  const statsBlock=slim
    ?`<div class="cline"><span><b>${r.step||0}</b>/7</span><span>${r.startedAt?dur(r.startedAt):"—"}</span><span>upd ${r.updatedAt?ago(r.updatedAt):"—"}</span>${m.tests?`<span>${esc(m.tests)}</span>`:""}${r.pr?prBit(r):""}</div>`
    :`<div class="meta">
      <div><div class="lbl">step</div><div class="v">${r.step||0}/7</div></div>
      <div><div class="lbl">elapsed</div><div class="v">${r.startedAt?dur(r.startedAt):"—"}</div></div>
      <div><div class="lbl">updated</div><div class="v small">${r.updatedAt?ago(r.updatedAt):"—"}</div></div>
      <div><div class="lbl">tests</div><div class="v small">${esc(m.tests||"—")}</div></div>
      ${m["tokens.total"]?`<div><div class="lbl">tokens</div><div class="v small">${esc(fmtTokens(m["tokens.total"]))}</div></div>`:""}
      ${runTok(r)?`<div><div class="lbl">tokens</div><div class="v small">${fmtTok(runTok(r))}</div></div>`:""}</div>
    <div class="chips"><span class="chip exec">${esc(r.executor||"gpt-5.6-sol")}</span><span class="chip plan">plan: ${esc(r.planner||"Claude")}</span>
      ${prBit(r)}</div>`;
  return `<div class="card ${open[r.id]?'open':''} ${compact?'compact':''}" data-id="${esc(r.id)}" style="border-left:4px solid ${edge}">
    <div class="head" data-toggle="${esc(r.id)}" tabindex="0" role="button" aria-expanded="${!!open[r.id]}">
      <div style="min-width:0"><div class="repo">${esc(r.repo)} · ${esc(r.branch)}</div><div class="title">${esc(r.title)}</div></div>
      ${pills[st]}<span class="caret">▸</span></div>
    ${relay(r)}
    ${activity}
    ${statsBlock}
    ${gate}${actions}${detail(r)}</div>`;
}
/* ops table row: active runs at 4+ */
function trow(r){
  const st=stateOf(r), cur=curStep(r), ck=cur?kindOf(cur.actor):"neutral";
  const age=r.staleSecs!=null?r.staleSecs:Math.max(0,Math.round(Date.now()/1000-(r.updatedAt||0)));
  const aStr=age<3600?Math.round(age/60)+"m":Math.floor(age/3600)+"h";
  const pills={needs:'<span class="pill needs">needs you</span>',handoff:'<span class="pill handoff">with claude</span>',
    dead:'<span class="pill dead">■ not running</span>',stale:`<span class="pill stale">⚠ stalled ${aStr}</span>`,
    live:'<span class="pill live"><span class="d"></span>running</span>',failed:'<span class="pill failed">failed</span>',
    done:'<span class="pill done">merged ✓</span>',rejected:'<span class="pill rejected">rejected</span>'};
  const edge={needs:"var(--await)",handoff:"var(--claude)",dead:"var(--fail)",stale:"var(--await)",live:"var(--live)",failed:"var(--fail)",done:"var(--done)",rejected:"var(--muted)"}[st];
  const actTxt=cur?`${cur.name}${cur.note?" — "+cur.note:""}`:"";
  let acts="";
  if(["stale","dead","failed"].includes(st))acts=`<div class="actions"><button class="btn sm restart" data-restart="${esc(r.id)}">↻ Restart</button></div>`;
  else if(st==="handoff"){const command=(r.review&&r.review.command)||`/orchestrate review ${r.topic}`;
    acts=`<div class="actions"><button class="btn sm" data-copy-review="${esc(command)}">⧉ copy review command</button></div>`;}
  return `<div class="trow ${open[r.id]?'open':''}" data-toggle="${esc(r.id)}" tabindex="0" role="button" aria-expanded="${!!open[r.id]}" style="border-left-color:${edge}">
      <span>${pills[st]}</span>
      <span class="t">${esc(r.title)}<small>${esc(r.repo)} · ${esc(r.branch)}</small></span>
      ${relay(r).replace('class="relay"','class="relay"')}
      <span class="act"><span class="who ${ck}">${whoLabel(ck)}</span><span class="x" title="${esc(actTxt)}">${esc(actTxt)}</span></span>
      <span class="num">${r.step||0}/7</span><span class="num">${r.startedAt?dur(r.startedAt):"—"}</span><span class="num">${r.updatedAt?ago(r.updatedAt):"—"}</span>
      <span class="caret">▸</span></div>
    <div class="tdetail">${acts}${detail(r)}</div>`;
}
/* history: terminal runs as quiet rows */
function hrow(r){
  const st=stateOf(r);
  const total=r.startedAt?span(r.startedAt,r.updatedAt||undefined):"—";
  const when=r.updatedAt?ago(r.updatedAt):"";
  const pr=r.pr?`<a class="pr merged" href="${esc(safeUrl(r.pr.url))}" target="_blank" rel="noopener" data-stop>#${esc(r.pr.number)} ↗</a>`:"";
  const pill=st==="done"?'<span class="pill done">merged ✓</span>':st==="failed"?'<span class="pill failed">failed</span>':'<span class="pill rejected">rejected</span>';
  return `<div class="hrow ${open[r.id]?'open':''}" data-toggle="${esc(r.id)}" tabindex="0" role="button" aria-expanded="${!!open[r.id]}">
      <span class="hd ${st}"></span>
      <span class="ht">${esc(r.title)}<small>${esc(r.repo)}</small></span>
      ${pr}<span class="hmeta">${total} · ${when}</span>${pill}<span class="caret">▸</span></div>
    <div class="hdetail">${st==="failed"?`<div class="actions" style="padding:12px 20px 0"><button class="btn sm restart" data-restart="${esc(r.id)}">↻ Restart</button></div>`:""}${detail(r)}</div>`;
}
function render(){
  const gated=RUNS.filter(isGateOpen);
  const hist=RUNS.filter(r=>!isGateOpen(r)&&isTerminal(r));
  const rest=RUNS.filter(r=>!isGateOpen(r)&&!isTerminal(r));
  const states=RUNS.map(stateOf);
  const cnt=s=>states.filter(x=>x===s).length;
  const chips=[];
  if(cnt("needs"))chips.push(`<span class="schip needs"><span class="n">${cnt("needs")}</span> need you</span>`);
  if(cnt("dead")+cnt("failed"))chips.push(`<span class="schip dead"><span class="n">${cnt("dead")+cnt("failed")}</span> not running</span>`);
  if(cnt("stale"))chips.push(`<span class="schip stale"><span class="n">${cnt("stale")}</span> stalled</span>`);
  if(cnt("live"))chips.push(`<span class="schip liv"><span class="d"></span><span class="n">${cnt("live")}</span> live</span>`);
  {const wk=Date.now()/1000-7*86400;const tok7d=RUNS.reduce((a,r)=>a+((r.startedAt&&r.startedAt>=wk)?(Number((r.metrics||{})["tokens.total"])||0):0),0);
  if(tok7d>0)chips.push(`<span class="schip" style="color:var(--faint)">≈${esc(fmtTokens(tok7d))} tokens · 7d</span>`);}
  if(cnt("handoff"))chips.push(`<span class="schip claude"><span class="n">${cnt("handoff")}</span> with claude</span>`);

        <div class="trow thead"><span>status</span><span>run</span><span>relay</span><span>activity</span><span style="text-align:right">step</span><span style="text-align:right">elapsed</span><span style="text-align:right">updated</span><span></span></div>`
        +rest.map(trow).join("")+`</div>`
      :(gated.length?`<h2>running <span class="count-pill">${rest.length}</span></h2>`:"")+
        `<div class="grid">`+rest.map(r=>card(r,false)).join("")+`</div>`;
  } else if(!RUNS.length){
    activeEl.innerHTML=`<div class="empty">
      <div class="erelay"><span class="node k-claude done"></span><span class="seg k-codex"></span><span class="node k-codex done"></span><span class="seg k-codex"></span><span class="node k-codex active" style="animation:none"></span><span class="seg"></span><span class="node"></span><span class="seg"></span><span class="node"></span></div>
      Nothing running. Start a run and it appears here live.
      <br><span class="cmd">/orchestrate <span class="c2">&lt;topic&gt;</span></span></div>`;

    histEl.innerHTML=`<h2>history <span class="count-pill">${hist.length}</span></h2><div class="hlist">`+hist.map(hrow).join("")+`</div>`;
    histEl.style.display="";

  updateChrome(states);
}
/* tab title + favicon reflect overall state (glanceable from another tab) */
function updateChrome(states){
  const cnt=s=>states.filter(x=>x===s).length;
  const needs=cnt("needs"),bad=cnt("dead")+cnt("failed"),stale=cnt("stale"),live=cnt("live");
  const bits=[];
  if(needs)bits.push("⚠ "+needs+" needs you");
  if(bad)bits.push(bad+" down");
  if(stale)bits.push(stale+" stalled");
  if(live)bits.push(live+" live");
  document.title=(bits.length?bits.join(" · ")+" — ":"")+"orchestrate";
  const color=OFFLINE||bad?"#C1443D":needs||stale?"#B37A16":live?"#1FA055":"#68707C";
  let l=document.querySelector('link[rel="icon"]');
  if(!l){l=document.createElement("link");l.rel="icon";document.head.appendChild(l);}
  l.href="data:image/svg+xml,"+encodeURIComponent(`<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><circle cx='8' cy='8' r='6.5' fill='${color}'/></svg>`);
}
/* desktop notifications: opt-in, fires on transition into needs/dead/failed */
let notifyOn=false,prevStates={};
const notifbtn=document.getElementById("notifbtn");
function setNotify(on){notifyOn=on;notifbtn.textContent="notify: "+(on?"on":"off");
  try{localStorage.setItem("orch-notify",on?"1":"0");}catch(_){}}
notifbtn.addEventListener("click",async()=>{
  if(notifyOn)return setNotify(false);
  if(!("Notification"in window))return notifbtn.textContent="notify: n/a";
  const p=Notification.permission==="granted"?"granted":await Notification.requestPermission();
  setNotify(p==="granted");});
try{if(localStorage.getItem("orch-notify")==="1"&&("Notification"in window)&&Notification.permission==="granted")setNotify(true);}catch(_){}
function notifyChanges(){
  RUNS.forEach(r=>{
    const s=stateOf(r),p=prevStates[r.id];
    if(notifyOn&&p&&p!==s&&["needs","dead","failed","stale"].includes(s)){
      try{new Notification("orchestrate — "+r.title,{body:s==="needs"?(r.gate&&r.gate.question)||"needs your answer":"run is "+(s==="needs"?"waiting":s),tag:"orch-"+r.id});}catch(_){}}
    prevStates[r.id]=s;});
}

/* theme: auto → light → dark, persisted */
const themebtn=document.getElementById("themebtn");

  if(t==="light"||t==="dark")document.documentElement.setAttribute("data-theme",t);
  else document.documentElement.removeAttribute("data-theme");

/* ── model overrides: temporary machine-wide model routing ── */
let OVR=null,ovrOpen=false;
const OVR_MODELS=["gpt-5.6-sol","gpt-5.6-pro","claude-opus-4","claude-sonnet-4.5"];
const OVR_EFFORTS=["low","medium","high"];
const OVR_TTLS=["1h","4h","8h","24h"];
function ovrRoles(){
  if(!OVR)return[];
  if(Array.isArray(OVR.roles))return OVR.roles;
  if(OVR.roles)return Object.entries(OVR.roles).map(([role,v])=>({role,...(v||{})}));
  return[];
}
function renderOvr(){
  const el=document.getElementById("overrides");
  const roles=ovrRoles();
  if(!roles.length){el.style.display="none";return;}
  el.style.display="";
  const now=Date.now()/1000;
  const sum=roles.filter(r=>r.model&&(!r.expiresAt||r.expiresAt>now))
    .map(r=>`<span class="ochip on ${kindOf(r.model)}">${esc(r.role)} → ${esc(r.model)}${r.expiresAt?" · "+span(now,r.expiresAt)+" left":""}</span>`).join("")
    ||`<span class="ochip">configured defaults</span>`;
  const rows=roles.map(r=>{
    const active=r.model&&(!r.expiresAt||r.expiresAt>now);
    const models=(OVR.models||OVR_MODELS).slice();
    if(r.model&&!models.includes(r.model))models.unshift(r.model);
    const opts=`<option value="">configured default</option>`+models.map(m=>`<option value="${esc(m)}" ${m===r.model?"selected":""}>${esc(m)}</option>`).join("");
    const seg=OVR_EFFORTS.map(e=>`<button type="button" data-eff="${e}" class="${e===(r.effort||"medium")?"on":""}">${e}</button>`).join("");
    const ttls=(OVR.ttls||OVR_TTLS).map(t=>`<option ${t==="4h"?"selected":""}>${esc(t)}</option>`).join("");
    return `<div class="orow" data-role="${esc(r.role)}">
      <span class="role">${esc(r.role)}</span>
      <span class="msel"><span class="mdot ${kindOf(r.model||"")}"></span><select class="osel omodel" aria-label="model for ${esc(r.role)}">${opts}</select></span>
      <span class="oseg">${seg}</span>
      <select class="osel ottl" aria-label="expires after">${ttls}</select>
      <span class="obtns">${active?`<span class="oexp">expires in ${r.expiresAt?span(now,r.expiresAt):"—"}</span>`:""}
        <button class="btn sm dark oapply">Apply</button>
        ${active?`<button class="btn sm oclear">Clear</button>`:""}</span></div>`;
  }).join("");
  el.innerHTML=`<div class="ovr ${ovrOpen?"open":""}">
    <div class="ohead" data-ovr-toggle tabindex="0" role="button" aria-expanded="${ovrOpen}">
      <span class="lbl" style="color:var(--muted)">model overrides</span><span class="osum">${sum}</span><span class="caret" style="padding-top:0">▸</span></div>
    <div class="obody"><p class="onote">Temporary, machine-wide: applies to newly started logical steps in every Claude-driver run. Apply replaces that role's prior override — and always expires.</p>${rows}</div></div>`;
  if(ovrOpen)el.querySelector(".ovr").classList.add("open");
}
async function loadOverrides(){
  if(DEMO){
    OVR=OVR||{roles:[{role:"critique",model:"gpt-5.6-sol",effort:"medium",expiresAt:Math.round(Date.now()/1000)+10100},{role:"implement"}]};
    renderOvr();return;}
  try{const res=await fetch("/api/overrides",{cache:"no-store"});if(!res.ok)throw 0;OVR=await res.json();}

}
document.addEventListener("click",async e=>{
  const oh=e.target.closest("[data-ovr-toggle]");
  if(oh&&!e.target.closest("button,select")){ovrOpen=!ovrOpen;renderOvr();return;}

      ttl:row.querySelector(".ottl").value};

      OVR={...OVR,roles:rs};renderOvr();return;}

});
