<style>
  :root{
    --ground:#F5F6F9; --surface:#FFFFFF; --surface-2:#F8FAFC;
    --ink:#161A22; --muted:#54607A; --faint:#7A879F; --border:#E3E7EF; --border-strong:#CCD3DF;
    --accent:#4E5AE0; --accent-soft:#EAEBFD;
    --done:#1F8F5F; --done-soft:#E4F4EC; --await:#B26E12; --await-soft:#FAEED7;
    --fail:#C63F39; --fail-soft:#FBE7E6; --run:#4E5AE0; --run-soft:#EAEBFD;
    --sans:ui-sans-serif,-apple-system,"SF Pro Text",system-ui,"Segoe UI",sans-serif;
    --mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,monospace;
    --r:14px; --shadow:0 1px 2px rgba(16,24,40,.05),0 2px 6px rgba(16,24,40,.05);
  }
  @media (prefers-color-scheme:dark){:root{
    --ground:#0D111A; --surface:#161C27; --surface-2:#1C2431;
    --ink:#EDF0F6; --muted:#A2ACBF; --faint:#707C90; --border:#28303D; --border-strong:#394456;
    --accent:#8A93FF; --accent-soft:#1E2740;
    --done:#4CCB92; --done-soft:#123026; --await:#F0B65A; --await-soft:#2E2514; --fail:#F1786F; --fail-soft:#301A19;
    --run:#8A93FF; --run-soft:#1E2740;
    --shadow:0 1px 2px rgba(0,0,0,.35),0 2px 8px rgba(0,0,0,.4);
  }}
  :root[data-theme="light"]{
    --ground:#F5F6F9; --surface:#FFFFFF; --surface-2:#F8FAFC; --ink:#161A22; --muted:#54607A; --faint:#7A879F;
    --border:#E3E7EF; --border-strong:#CCD3DF; --accent:#4E5AE0; --accent-soft:#EAEBFD;
    --done:#1F8F5F; --done-soft:#E4F4EC; --await:#B26E12; --await-soft:#FAEED7; --fail:#C63F39; --fail-soft:#FBE7E6; --run:#4E5AE0; --run-soft:#EAEBFD;
    --shadow:0 1px 2px rgba(16,24,40,.05),0 2px 6px rgba(16,24,40,.05);
  }
  :root[data-theme="dark"]{
    --ground:#0D111A; --surface:#161C27; --surface-2:#1C2431; --ink:#EDF0F6; --muted:#A2ACBF; --faint:#707C90;
    --border:#28303D; --border-strong:#394456; --accent:#8A93FF; --accent-soft:#1E2740;
    --done:#4CCB92; --done-soft:#123026; --await:#F0B65A; --await-soft:#2E2514; --fail:#F1786F; --fail-soft:#301A19; --run:#8A93FF; --run-soft:#1E2740;
    --shadow:0 1px 2px rgba(0,0,0,.35),0 2px 8px rgba(0,0,0,.4);
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--ground);color:var(--ink);font-family:var(--sans);
    font-size:15.5px;line-height:1.5;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1160px;margin:0 auto;padding:34px 26px 72px}
  .mono{font-family:var(--mono);font-variant-numeric:tabular-nums}
  .lbl{font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);font-weight:700}

  header{display:flex;align-items:flex-end;justify-content:space-between;gap:18px;margin-bottom:24px;flex-wrap:wrap}
  h1{font-size:27px;font-weight:720;letter-spacing:-.02em;margin:0}
  .sub{color:var(--muted);font-size:15px;margin-top:5px}
  .live{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:13.5px;font-family:var(--mono)}
  .live .dot{width:9px;height:9px;border-radius:50%;background:var(--done);animation:pulse 2.4s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 color-mix(in srgb,var(--done) 55%,transparent)}70%{box-shadow:0 0 0 7px transparent}100%{box-shadow:0 0 0 0 transparent}}
  @media (prefers-reduced-motion:reduce){.live .dot{animation:none}}

  .summary{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:30px}
  .stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
    padding:15px 20px;min-width:128px;box-shadow:var(--shadow)}
  .stat .n{font-size:32px;font-weight:720;font-family:var(--mono);font-variant-numeric:tabular-nums;line-height:1.05}
  .stat.await .n{color:var(--await)} .stat.run .n{color:var(--run)} .stat.done .n{color:var(--done)}
  .stat .k{margin-top:4px}

  section h2{font-size:13.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);
    font-weight:720;margin:0 0 13px;display:flex;align-items:center;gap:9px}
  .count-pill{font-family:var(--mono);background:var(--surface);border:1px solid var(--border);
    border-radius:20px;padding:2px 10px;font-size:12.5px;color:var(--muted)}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(370px,1fr));gap:16px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
    box-shadow:var(--shadow);overflow:hidden;transition:border-color .15s,box-shadow .15s}
  .card:hover{border-color:var(--border-strong)}
  .card.await{border-left:4px solid var(--await)}
  .card .head{display:flex;align-items:flex-start;gap:12px;padding:17px 19px 14px;cursor:pointer}
  .card .repo{font-family:var(--mono);font-size:13px;color:var(--muted)}
  .card .title{font-weight:660;font-size:17.5px;letter-spacing:-.01em;margin-top:3px;text-wrap:balance;line-height:1.28}
  .pill{font-size:12.5px;font-weight:700;padding:4px 11px;border-radius:20px;white-space:nowrap;font-family:var(--mono)}
  .pill.done{background:var(--done-soft);color:var(--done)}
  .pill.running{background:var(--run-soft);color:var(--run)}
  .pill.await{background:var(--await-soft);color:var(--await)}
  .pill.fail{background:var(--fail-soft);color:var(--fail)}

  .stepper{display:flex;align-items:center;gap:0;padding:4px 19px 15px}
  .node{width:16px;height:16px;border-radius:50%;border:2.5px solid var(--border-strong);
    background:var(--surface);flex:0 0 auto;position:relative;z-index:1}
  .node.done{background:var(--done);border-color:var(--done)}
  .node.active{border-color:var(--accent);background:var(--surface);box-shadow:0 0 0 4px var(--accent-soft)}
  .node.fail{background:var(--fail);border-color:var(--fail)}
  .conn{height:2.5px;flex:1 1 auto;background:var(--border);min-width:6px}
  .conn.done{background:var(--done)}

  .meta{display:flex;gap:24px;padding:0 19px 16px;flex-wrap:wrap}
  .meta .cell .v{font-family:var(--mono);font-variant-numeric:tabular-nums;font-size:18px;font-weight:640;margin-top:2px}
  .meta .cell .v.small{font-size:15px;font-weight:560;color:var(--muted)}
  .chips{display:flex;gap:8px;flex-wrap:wrap;padding:0 19px 17px}
  .chip{font-family:var(--mono);font-size:12.5px;padding:4px 10px;border-radius:7px;
    background:var(--surface-2);border:1px solid var(--border);color:var(--muted)}
  .chip.exec{color:var(--ink);font-weight:560}
  a.pr{color:var(--accent);text-decoration:none;font-family:var(--mono);font-size:13px;font-weight:640}
  a.pr:hover{text-decoration:underline}

  .gate{margin:0 19px 17px;background:var(--await-soft);border:1px solid color-mix(in srgb,var(--await) 40%,transparent);
    border-radius:11px;padding:14px 15px}
  .gate .q{font-weight:620;font-size:15px;margin-bottom:11px;line-height:1.4}
  .gate .opts{display:flex;gap:9px;flex-wrap:wrap}
  .btn{font-family:var(--sans);font-size:14px;font-weight:640;padding:9px 16px;border-radius:9px;
    border:1px solid var(--border-strong);background:var(--surface);color:var(--ink);cursor:pointer;
    transition:transform .06s,background .12s,border-color .12s}
  .btn:hover{border-color:var(--accent);background:var(--accent-soft)}
  .btn:active{transform:translateY(1px)}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  .btn.primary:hover{filter:brightness(1.07)}
  .btn:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  .answered{font-size:14px;color:var(--muted);padding:0 19px 16px;display:flex;align-items:center;gap:8px}
  .answered b{color:var(--ink);font-weight:620}

  .detail{border-top:1px solid var(--border);padding:8px 19px 10px;background:var(--surface-2)}
  .card.open .detail{display:block} .detail{display:none}
  .card.open .caret{transform:rotate(90deg)}
  .caret{color:var(--faint);transition:transform .15s;margin-left:auto;flex:0 0 auto;padding-top:3px;font-size:15px}
  .row{display:flex;gap:13px;padding:11px 0;border-bottom:1px solid var(--border)}
  .row:last-child{border-bottom:0}
  .row .idx{font-family:var(--mono);color:var(--faint);font-size:13px;width:18px;flex:0 0 auto;padding-top:2px}
  .row .stn{width:11px;height:11px;border-radius:50%;flex:0 0 auto;margin-top:5px;background:var(--border-strong)}
  .row .stn.done{background:var(--done)} .row .stn.active{background:var(--accent)}
  .row .stn.pending{background:var(--border-strong)} .row .stn.fail{background:var(--fail)}
  .row .name{font-weight:620;font-size:14.5px} .row .actor{font-family:var(--mono);font-size:12px;color:var(--faint);font-weight:500}
  .row .note{color:var(--muted);font-size:13.5px;margin-top:3px}
  .row .st{margin-left:auto;font-size:12px;font-family:var(--mono);color:var(--faint);flex:0 0 auto;padding-top:2px}
  .foot{margin-top:34px;color:var(--faint);font-size:13px;text-align:center}
  .empty{color:var(--muted);font-size:14px;padding:6px 0 2px}
</style>

<div class="wrap">
  <header>
    <div>
      <h1>orchestrate</h1>
      <div class="sub">dual-brain runs on this machine · Claude plans &amp; reviews · Codex (gpt-5.5) executes</div>
    </div>
    <div class="live"><span class="dot"></span><span id="clock">updated just now</span></div>
  </header>

  <div class="summary" id="summary"></div>
  <section id="needs" style="margin-bottom:30px"></section>
  <section id="active"></section>
  <div class="foot mono">~/.orchestrate/runs · auto-refreshes · click a run to expand its pipeline</div>
</div>

<script>
let RUNS = [], open = {}, localAnswered = {};
function ago(sec){const s=Math.max(0,Math.round(Date.now()/1000-sec));if(s<60)return s+"s ago";const m=Math.round(s/60);if(m<60)return m+"m ago";const h=Math.floor(m/60);return h+"h "+(m%60)+"m ago";}
function dur(sec){const m=Math.max(0,Math.round((Date.now()/1000-sec)/60));if(m<60)return m+"m";const h=Math.floor(m/60);return h+"h "+(m%60)+"m";}
const esc=s=>String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const safeUrl=u=>/^(https?:\/\/|#)/.test(u||"")?u:"#";  // block javascript:/data: in hrefs
const isAns=r=>r.answered||localAnswered[r.id];
const ansChoice=r=>(r.answered&&r.answered.choice)||localAnswered[r.id];

function stepper(r){let h='<div class="stepper">';(r.steps||[]).forEach((s,i)=>{
  const cls=s.state==="done"?"done":s.state==="active"?"active":s.state==="fail"?"fail":"";
  h+=`<span class="node ${cls}" title="${esc(s.name)}"></span>`;
  if(i<r.steps.length-1)h+=`<span class="conn ${r.steps[i].state==='done'?'done':''}"></span>`;});return h+'</div>';}
function detail(r){let h='<div class="detail">';(r.steps||[]).forEach(s=>{
  h+=`<div class="row"><span class="idx">${s.n}</span><span class="stn ${s.state}"></span>
    <div><div class="name">${esc(s.name)} <span class="actor">${esc(s.actor)}</span></div>
    ${s.note?`<div class="note">${esc(s.note)}</div>`:''}</div><span class="st">${esc(s.state)}</span></div>`;});return h+'</div>';}
function card(r){
  const st=r.status==="done"?["done","merged ✓"]:r.status==="await"?["await","needs you"]:
    r.status==="review"?["running","review→fix"]:r.status==="fail"?["fail","failed"]:["running","running"];
  const m=r.metrics||{}, prTxt=r.pr?`#${r.pr.number} ${String(r.pr.state||"").toLowerCase()}`:"no PR yet";
  let gate="";
  if(r.gate&&!isAns(r)){gate=`<div class="gate"><div class="q">${esc(r.gate.question)}</div><div class="opts">`+
    (r.gate.options||[]).map(o=>`<button class="btn ${o.primary?'primary':''}" data-ans="${esc(r.id)}" data-choice="${esc(o.label)}">${esc(o.label)}</button>`).join("")+`</div></div>`;}
  else if(isAns(r)){gate=`<div class="answered">✓ You chose <b>${esc(ansChoice(r))}</b> — sent to the run</div>`;}
  return `<div class="card ${r.gate&&!isAns(r)?'await':''} ${open[r.id]?'open':''}" data-id="${esc(r.id)}">
    <div class="head" data-toggle="${esc(r.id)}">
      <div style="min-width:0"><div class="repo">${esc(r.repo)} · ${esc(r.branch)}</div><div class="title">${esc(r.title)}</div></div>
      <span class="pill ${st[0]}">${st[1]}</span><span class="caret">▸</span></div>
    ${stepper(r)}
    <div class="meta">
      <div class="cell"><div class="lbl">step</div><div class="v">${r.step||0}/7</div></div>
      <div class="cell"><div class="lbl">elapsed</div><div class="v">${r.startedAt?dur(r.startedAt):"—"}</div></div>
      <div class="cell"><div class="lbl">updated</div><div class="v small">${r.updatedAt?ago(r.updatedAt):"—"}</div></div>
      <div class="cell"><div class="lbl">tests</div><div class="v small">${esc(m.tests||"—")}</div></div></div>
    <div class="chips"><span class="chip exec">${esc(r.executor||"gpt-5.5")}</span><span class="chip">plan: ${esc(r.planner||"Claude")}</span>
      ${r.pr?`<a class="pr" href="${esc(safeUrl(r.pr.url))}" target="_blank" rel="noopener">${prTxt} ↗</a>`:`<span class="chip">${prTxt}</span>`}</div>
    ${gate}${detail(r)}</div>`;
}
function render(){
  const needs=RUNS.filter(r=>r.gate&&!isAns(r)), rest=RUNS.filter(r=>!(r.gate&&!isAns(r)));
  const nRun=RUNS.filter(r=>["running","review"].includes(r.status)).length;
  const nAwait=needs.length, nDone=RUNS.filter(r=>r.status==="done").length;
  document.getElementById("summary").innerHTML=
    `<div class="stat run"><div class="n">${nRun}</div><div class="k lbl">running</div></div>
     <div class="stat await"><div class="n">${nAwait}</div><div class="k lbl">need you</div></div>
     <div class="stat done"><div class="n">${nDone}</div><div class="k lbl">done</div></div>
     <div class="stat"><div class="n">${RUNS.length}</div><div class="k lbl">total runs</div></div>`;
  const needsEl=document.getElementById("needs");
  if(nAwait){needsEl.innerHTML=`<h2>Needs you <span class="count-pill">${nAwait}</span></h2><div class="grid">`+needs.map(card).join("")+`</div>`;needsEl.style.display="";}
  else needsEl.style.display="none";
  document.getElementById("active").innerHTML=`<h2>All runs <span class="count-pill">${rest.length}</span></h2>`+
    (rest.length?`<div class="grid">`+rest.map(card).join("")+`</div>`:`<div class="empty">No runs yet. Start one with <span class="mono">/orchestrate &lt;topic&gt;</span>.</div>`);
}
document.addEventListener("click",async e=>{
  const ans=e.target.closest("[data-ans]");
  if(ans){e.stopPropagation();const id=ans.dataset.ans,choice=ans.dataset.choice;localAnswered[id]=choice;render();
    try{await fetch("/api/answer",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({id,choice})});}catch(_){}
    load();return;}
  const tog=e.target.closest("[data-toggle]");
  if(tog){open[tog.dataset.toggle]=!open[tog.dataset.toggle];render();}
});
async function load(){
  try{const res=await fetch("/api/runs",{cache:"no-store"});RUNS=await res.json();
    RUNS.sort((a,b)=>(a.gate&&!isAns(a)?0:1)-(b.gate&&!isAns(b)?0:1)||(b.updatedAt||0)-(a.updatedAt||0));
    render();document.getElementById("clock").textContent="updated "+new Date().toLocaleTimeString();}
  catch(e){document.getElementById("clock").textContent="dashboard offline";}
}
load();setInterval(load,4000);

</script>
